<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Анти Миннахметов</title>

<style>
* { box-sizing: border-box; }

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#000;
    color:#ddd;
}

.topbar{
    background:#0b0b0b;
    padding:15px 20px;
    border-bottom:1px solid #222;
}

.label{
    font-size:14px;
    margin-bottom:6px;
    color:#aaa;
}

/* WRAPPER */
.editor-wrap{
    position:relative;
    width:100%;
    min-height:160px;
}

/* OVERLAY */
.highlight-layer{
    position:absolute;
    inset:0;

    padding:10px;
    font-size:14px;
    line-height:1.5em;

    white-space:pre-wrap;
    overflow-wrap:break-word;

    background:#111;
    border:1px solid #333;
    color:#ddd;

    overflow:hidden;

    pointer-events:none;

    font-family:inherit;
    tab-size:4;
}

/* TEXT INPUT (ВИДИМЫЙ!) */
textarea{
    position:absolute;
    inset:0;

    padding:10px;
    font-size:14px;
    line-height:1.5em;

    border:1px solid #333;
    background:transparent;

    color:#fff;
    caret-color:#fff;

    outline:none;
    resize:none;

    font-family:inherit;
    tab-size:4;

    overflow:auto;
    white-space:pre-wrap;
    overflow-wrap:break-word;
}

/* highlight */
.highlight{
    background:#b30000;
    color:#fff;
}

/* buttons */
.buttons{
    margin-top:10px;
}

button, select{
    background:#111;
    border:1px solid #333;
    color:#ddd;
    padding:6px 12px;
    margin-right:6px;
    cursor:pointer;
}

button:hover, select:hover{
    background:#222;
}

.container{
    padding:20px;
}

.panel{
    background:#050505;
    border:1px solid #222;
    padding:15px;
    margin-bottom:15px;
    white-space:pre-wrap;
    overflow-wrap:break-word;
}

.fixed{
    background:#021902;
}

.title{
    margin-bottom:6px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="topbar">
<div class="label">Текст для изменений</div>

<div class="editor-wrap">
    <div id="highlight" class="highlight-layer"></div>
    <textarea id="editor"></textarea>
</div>

<div class="buttons">
<select id="mode">
    <option value="ru-en">RU → EN</option>
    <option value="en-ru">EN → RU</option>
</select>

<button onclick="clearText()">Очистить</button>
<button onclick="copyText()">Копировать текст</button>
<button onclick="copyWithChanges()">Копировать с изменениями</button>
</div>
</div>

<div class="container">

<div class="title">Текст с изменениями</div>
<div id="fixed" class="panel fixed"></div>

<div class="title">Команды</div>
<div id="command" class="panel fixed"></div>

</div>

<script>
const editor = document.getElementById("editor");
const highlight = document.getElementById("highlight");
const fixed = document.getElementById("fixed");
const commandDiv = document.getElementById("command");
const modeSelect = document.getElementById("mode");

const ruToEn = {
'А':'A','В':'B','Е':'E','К':'K','М':'M','Н':'H','О':'O','Р':'P','С':'C','Т':'T','Х':'X','У':'Y','З':'Z',
'а':'a','в':'b','е':'e','к':'k','м':'m','н':'h','о':'o','р':'p','с':'c','т':'t','х':'x','у':'y','з':'z'
};

const enToRu = {
'a':'а','o':'о','e':'е','y':'у','c':'с',
'A':'А','O':'О','E':'Е','Y':'У','C':'С'
};

function transform(ch, mode){
    if(mode==="ru-en") return ruToEn[ch] || ch;
    return enToRu[ch] || ch;
}

function update(){
    const text = editor.value;
    const mode = modeSelect.value;

    let html = "";
    let fixedText = "";

    for (let ch of text){
        const replaced = transform(ch, mode);
        const changed = replaced !== ch;

        html += changed ? `<span class="highlight">${ch}</span>` : ch;
        fixedText += replaced;
    }

    highlight.innerHTML = html || "";
    fixed.textContent = fixedText || "—";

    const cmd = fixedText
        .split(/\n/)
        .map(l => l.trim())
        .filter(Boolean)
        .join(" && ");

    commandDiv.textContent = cmd || "—";
}

editor.addEventListener("input", update);
modeSelect.addEventListener("change", update);

/* синхронизация скролла */
editor.addEventListener("scroll", () => {
    highlight.scrollTop = editor.scrollTop;
    highlight.scrollLeft = editor.scrollLeft;
});

function clearText(){
    editor.value = "";
    update();
}

function copyText(){
    navigator.clipboard.writeText(fixed.textContent);
}

function copyWithChanges(){
    const cmd = fixed.textContent
        .split(/\n/)
        .map(l => l.trim())
        .filter(Boolean)
        .join(" && ");

    navigator.clipboard.writeText(cmd);
}

update();
</script>

</body>
</html>
