<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Новая вкладка</title>

<style>
* { box-sizing: border-box; }

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#000;
    color:#ddd;
}

.topbar{
    background:#0b0b0b;
    padding:15px 20px;
    border-bottom:1px solid #222;
}

.label{
    font-size:14px;
    margin-bottom:6px;
    color:#aaa;
}

.editor{
    width:100%;
    min-height:160px;
    background:#111;
    border:1px solid #333;
    color:#eee;
    padding:10px;
    font-size:14px;
    line-height:1.5em;
    outline:none;
    white-space:pre-wrap;
    overflow-wrap:break-word;
}

.highlight{
    background:#b30000;
    color:#fff;
}

.buttons{
    margin-top:10px;
}

button, select{
    background:#111;
    border:1px solid #333;
    color:#ddd;
    padding:6px 12px;
    margin-right:6px;
    cursor:pointer;
}

button:hover, select:hover{
    background:#222;
}

.container{
    padding:20px;
}

.panel{
    background:#050505;
    border:1px solid #222;
    padding:15px;
    margin-bottom:15px;
    white-space:pre-wrap;
    overflow-wrap:break-word;
}

.fixed{
    background:#021902;
}

.title{
    margin-bottom:6px;
    color:#aaa;
}
</style>
</head>

<body>

<div class="topbar">
<div class="label">Текст для изменений</div>

<div id="editor" class="editor" contenteditable="true"></div>

<div class="buttons">
<select id="mode">
    <option value="ru-en">RU → EN</option>
    <option value="en-ru">EN → RU</option>
</select>

<button onclick="clearText()">Очистить</button>
<button onclick="copyText()">Копировать текст</button>
</div>
</div>

<div class="container">

<div class="title">Изменённый текст</div>
<div id="fixed" class="panel fixed"></div>

<div class="title">Режим команд</div>
<div id="command" class="panel fixed"></div>

</div>

<script>
const editor = document.getElementById("editor");
const fixed = document.getElementById("fixed");
const commandDiv = document.getElementById("command");
const modeSelect = document.getElementById("mode");

// карты
const ruToEn = {
    'А':'A','В':'B','Е':'E','К':'K','М':'M','Н':'H','О':'O','Р':'P','С':'C','Т':'T','Х':'X','У':'Y','З':'Z',
    'а':'a','в':'b','е':'e','к':'k','м':'m','н':'h','о':'o','р':'p','с':'c','т':'t','х':'x','у':'y','з':'z'
};

const enToRu = {
    'A':'А','B':'В','E':'Е','K':'К','M':'М','H':'Н','O':'О','P':'Р','C':'С','T':'Т','X':'Х','Y':'У','Z':'З',
    'a':'а','b':'в','e':'е','k':'к','m':'м','h':'н','o':'о','p':'р','c':'с','t':'т','x':'х','y':'у','z':'з'
};

const russian = /[а-яА-ЯёЁ]/g;

function getText() {
    return editor.innerText;
}

function setCaretToEnd(el){
    const range = document.createRange();
    const sel = window.getSelection();
    range.selectNodeContents(el);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
}

function update(){
    const text = getText();
    const mode = modeSelect.value;

    let highlightedHTML = "";
    let fixedText = "";

    for (let char of text) {

        let replaced = char;

        if (mode === "ru-en") {
            if (ruToEn[char]) {
                replaced = ruToEn[char];
                highlightedHTML += `<span class="highlight">${char}</span>`;
            } else {
                highlightedHTML += char;
            }
        } else {
            if (enToRu[char]) {
                replaced = enToRu[char];
                highlightedHTML += `<span class="highlight">${char}</span>`;
            } else {
                highlightedHTML += char;
            }
        }

        fixedText += replaced;
    }

    // сохраняем позицию курсора (упрощённо — в конец)
    editor.innerHTML = highlightedHTML.replace(/\n/g,"<br>");
    setCaretToEnd(editor);

    fixed.textContent = fixedText || "—";

    const commandText = fixedText
        .split(/\r?\n/)
        .map(l=>l.trim())
        .filter(Boolean)
        .join(" && ");

    commandDiv.textContent = commandText || "—";
}

editor.addEventListener("input", update);
modeSelect.addEventListener("change", update);

function clearText(){
    editor.innerHTML="";
    update();
}

function copyText(){
    navigator.clipboard.writeText(fixed.textContent);
}

update();
</script>

</body>
</html>
